<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">番茄钟</h1>
    <div class="timer-box">
      <span id="time">25:00</span>
    </div>
    <div class="mode-group">
      <button class="mode-btn active" data-time="25">专注25分钟</button>
      <button class="mode-btn" data-time="5">短休5分钟</button>
      <button class="mode-btn" data-time="15">长休15分钟</button>
    </div>
    <div class="btn-group">
      <button id="start">开始</button>
      <button id="pause">暂停</button>
      <button id="reset">重置</button>
    </div>
  </div>

  <!-- 提示音 -->
  <audio id="alarm" src="assets/alarm.mp3">

  <script src="js/app.js"></script>
</body>
</html>
